<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignCLI</title>
  <!-- Lit을 CDN ESM으로(번들러·npm 불필요, 메모리 규율: React 금지·경량). -->
  <script type="importmap">
  {
    "imports": {
      "lit": "https://esm.sh/lit@3.1.4",
      "lit/": "https://esm.sh/lit@3.1.4/"
    }
  }
  </script>
  <!-- 디스플레이/수치=JetBrains Mono(코드 정체성), 본문=Sora(가독성 좋은 산세리프). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ───────── Light "Precision Studio" ─────────
       라이트톤 + 높은 대비 + 큰 폰트로 가독성 우선. 정체성(모노 계측기)은 유지.
       선택/액센트는 선명한 인디고(밝은 배경에서 또렷). CSS 커스텀 프로퍼티는
       shadow DOM으로 상속 → :root 선언이 모든 Lit 컴포넌트에 적용. */
    :root {
      color-scheme: light;
      /* 배경: 따뜻한 오프화이트 3계층. */
      --paper:   #f6f5f2;   /* body / 캔버스 바깥 */
      --surface: #fbfaf8;   /* 패널 표면 */
      --surface-2:#ffffff;  /* 카드/input 채움 */
      --sunken:  #eeece7;   /* 셀 hover/홈 */
      --line:    #ddd9d1;   /* 보더 헤어라인 */
      --line-2:  #c9c4ba;   /* 진한 보더 */
      /* 텍스트(충분한 대비). */
      --fg:      #1c1b18;   /* 본문 — 거의 검정 잉크 */
      --fg-dim:  #565249;   /* 보조 */
      --fg-faint:#8a857a;   /* 라벨/비활성 */
      /* 액센트: 선명한 인디고(선택/포커스) + 보조 틸. */
      --accent:  #3a5bd9;   /* 선택/액티브/포커스 — 또렷 */
      --accent-strong: #2c46b0;
      --accent-soft: rgba(58, 91, 217, 0.10);
      --accent-line: rgba(58, 91, 217, 0.35);
      --teal:    #0a8f80;   /* 측정값 강조 */
      --danger:  #d23b4e;
      /* 치수 — 폰트/컨트롤 크게. */
      --ctl-h: 34px;
      --radius: 6px;
      --fz: 13.5px;         /* 본문 베이스 */
      --fz-mono: 12.5px;    /* 모노 라벨/수치 */
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --sans: "Sora", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; overflow: hidden;
      font-family: var(--sans);
      font-size: var(--fz); line-height: 1.45;
      color: var(--fg); background: var(--paper);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    /* 가는 스크롤바(라이트). */
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 3px solid var(--surface); }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-faint); }
  </style>
</head>
<body>
  <app-shell></app-shell>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
