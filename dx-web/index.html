<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignCLI</title>
  <!-- Lit을 CDN ESM으로(번들러·npm 불필요, 메모리 규율: React 금지·경량). -->
  <script type="importmap">
  {
    "imports": {
      "lit": "https://esm.sh/lit@3.1.4",
      "lit/": "https://esm.sh/lit@3.1.4/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ───────── Figma풍 테마 토큰 ─────────
       다크 기본(:root), 라이트는 [data-theme="light"] 오버라이드.
       CSS 커스텀 프로퍼티는 shadow DOM으로 상속 → 모든 Lit 컴포넌트에 적용.
       ★UI 규칙: 이모지 금지 — 아이콘은 전부 인라인 SVG★ */
    :root {
      color-scheme: dark;
      --bg-canvas: #202326;     /* 캔버스 바닥 */
      --bg-panel: #2a2d30;      /* 패널/툴바 */
      --bg-elev: #35393d;       /* input/메뉴/카드 */
      --bg-hover: #35393d;      /* 행 hover */
      --line: #454a4f;          /* 헤어라인 */
      --line-soft: #383d42;
      --fg: #ffffff;
      --fg-2: #b3b3b3;          /* 보조 텍스트 */
      --fg-3: #7f7f7f;          /* 라벨/비활성 */
      --accent: #9fc7da;        /* Slate wireframe ice blue */
      --accent-strong: rgb(19, 131, 254);
      --accent-soft: rgba(159, 199, 218, 0.18);
      --sel-fill: rgba(159, 199, 218, 0.12);
      --danger: #f24822;
      --ctl-h: 28px;
      --radius: 6px;
      --fz: 11.5px;
      --shadow-menu: 0 6px 24px rgba(0, 0, 0, 0.45);
    }
    [data-theme="light"] {
      color-scheme: light;
      --bg-canvas: #e9e9e6;
      --bg-panel: #f5f5f3;
      --bg-elev: #ffffff;
      --bg-hover: #ececea;
      --line: #d2d2ce;
      --line-soft: #e3e3df;
      --fg: #1e1e1e;
      --fg-2: #555555;
      --fg-3: #9b9b9b;
      --accent: #87b9cf;
      --accent-strong: rgb(19, 131, 254);
      --accent-soft: rgba(135, 185, 207, 0.18);
      --sel-fill: rgba(135, 185, 207, 0.10);
      --shadow-menu: 0 6px 24px rgba(0, 0, 0, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; overflow: hidden;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: var(--fz); line-height: 1.4;
      color: var(--fg); background: var(--bg-canvas);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; border: 2px solid var(--bg-panel); }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-3); }
  </style>
</head>
<body>
  <app-shell></app-shell>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
